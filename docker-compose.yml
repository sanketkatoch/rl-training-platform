
services:

  postgres:
    image: postgres:15
    restart: always
    container_name: rl_postgres
    environment:
      POSTGRES_USER: rluser
      POSTGRES_PASSWORD: rlpassword
      POSTGRES_DB: rlplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    container_name: rl_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: